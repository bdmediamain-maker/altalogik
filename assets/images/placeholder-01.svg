<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="textGrad" x1="450" y1="0" x2="750" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E5A0"/>
      <stop offset="50%" stop-color="#00AADD"/>
      <stop offset="100%" stop-color="#0055CC"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="500" y1="0" x2="700" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00AADD" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00AADD" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00AADD" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00AADD" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#00AADD" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="675" fill="#0D1F3C"/>

  <!-- Tech grid -->
  <g stroke="#7A9CC0" stroke-opacity="0.06" stroke-width="1">
    <line x1="60"   y1="0" x2="60"   y2="675"/>
    <line x1="120"  y1="0" x2="120"  y2="675"/>
    <line x1="180"  y1="0" x2="180"  y2="675"/>
    <line x1="240"  y1="0" x2="240"  y2="675"/>
    <line x1="300"  y1="0" x2="300"  y2="675"/>
    <line x1="360"  y1="0" x2="360"  y2="675"/>
    <line x1="420"  y1="0" x2="420"  y2="675"/>
    <line x1="480"  y1="0" x2="480"  y2="675"/>
    <line x1="540"  y1="0" x2="540"  y2="675"/>
    <line x1="600"  y1="0" x2="600"  y2="675"/>
    <line x1="660"  y1="0" x2="660"  y2="675"/>
    <line x1="720"  y1="0" x2="720"  y2="675"/>
    <line x1="780"  y1="0" x2="780"  y2="675"/>
    <line x1="840"  y1="0" x2="840"  y2="675"/>
    <line x1="900"  y1="0" x2="900"  y2="675"/>
    <line x1="960"  y1="0" x2="960"  y2="675"/>
    <line x1="1020" y1="0" x2="1020" y2="675"/>
    <line x1="1080" y1="0" x2="1080" y2="675"/>
    <line x1="1140" y1="0" x2="1140" y2="675"/>
    <line x1="0" y1="45"  x2="1200" y2="45"/>
    <line x1="0" y1="90"  x2="1200" y2="90"/>
    <line x1="0" y1="135" x2="1200" y2="135"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="225" x2="1200" y2="225"/>
    <line x1="0" y1="270" x2="1200" y2="270"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="405" x2="1200" y2="405"/>
    <line x1="0" y1="450" x2="1200" y2="450"/>
    <line x1="0" y1="495" x2="1200" y2="495"/>
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="585" x2="1200" y2="585"/>
    <line x1="0" y1="630" x2="1200" y2="630"/>
  </g>

  <!-- Glow -->
  <ellipse cx="600" cy="337" rx="280" ry="180" fill="url(#glow)"/>

  <!-- Corner brackets -->
  <g stroke="#00AADD" stroke-width="1.5" fill="none" stroke-opacity="0.35">
    <polyline points="40,80 40,40 80,40"/>
    <polyline points="1160,80 1160,40 1120,40"/>
    <polyline points="40,595 40,635 80,635"/>
    <polyline points="1160,595 1160,635 1120,635"/>
  </g>

  <!-- CASE STUDY label -->
  <text x="600" y="268" text-anchor="middle"
        font-family="'JetBrains Mono','Courier New',monospace"
        font-size="10" letter-spacing="6" fill="#7A9CC0" opacity="0.5">CASE STUDY</text>

  <!-- Number -->
  <text x="600" y="355" text-anchor="middle" dominant-baseline="middle"
        font-family="'JetBrains Mono','Courier New',monospace"
        font-size="108" font-weight="500" fill="url(#textGrad)" letter-spacing="-2">01</text>

  <!-- Divider -->
  <line x1="500" y1="388" x2="700" y2="388" stroke="url(#lineGrad)" stroke-width="1"/>

  <!-- Sector -->
  <text x="600" y="415" text-anchor="middle"
        font-family="'JetBrains Mono','Courier New',monospace"
        font-size="15" letter-spacing="3" fill="#7A9CC0" opacity="0.7">/ Automotive</text>

  <!-- Watermark -->
  <text x="600" y="648" text-anchor="middle"
        font-family="'JetBrains Mono','Courier New',monospace"
        font-size="8" letter-spacing="5" fill="#7A9CC0" opacity="0.2">ALTALOGIK</text>
</svg>
